<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gemini RAG — Sign In</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f0f13; --surface: #1a1a24; --border: #2a2a3a;
      --accent: #7c6af7; --accent2: #0fa86e; --text: #e8e8f0;
      --muted: #6b6b8a; --error: #f87171; --radius: 14px;
      --font: 'Inter', system-ui, sans-serif;
    }
    body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100dvh; display: grid; place-items: center; padding: 24px; }

    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 40px; width: 100%; max-width: 420px; }

    .logo-row { display: flex; align-items: center; gap: 12px; margin-bottom: 32px; justify-content: center; }
    .logo { width: 42px; height: 42px; border-radius: 12px; background: linear-gradient(135deg, var(--accent), var(--accent2)); display: grid; place-items: center; font-size: 20px; }
    .logo-row h1 { font-size: 20px; font-weight: 700; }

    .tabs { display: flex; background: var(--bg); border-radius: 10px; padding: 4px; margin-bottom: 28px; }
    .tab { flex: 1; padding: 10px; text-align: center; font-size: 14px; font-weight: 600; border-radius: 8px; cursor: pointer; color: var(--muted); transition: all .2s; border: none; background: none; }
    .tab.active { background: var(--surface); color: var(--text); box-shadow: 0 1px 4px rgba(0,0,0,.4); }

    .form { display: flex; flex-direction: column; gap: 16px; }
    .form.hidden { display: none; }

    label { font-size: 13px; color: var(--muted); display: block; margin-bottom: 6px; }
    input {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      color: var(--text); border-radius: 10px; padding: 12px 14px;
      font-size: 14px; outline: none; transition: border-color .2s;
    }
    input:focus { border-color: var(--accent); }
    input::placeholder { color: var(--muted); }

    .btn {
      width: 100%; padding: 13px; background: var(--accent); color: #fff;
      border: none; border-radius: 10px; font-size: 15px; font-weight: 600;
      cursor: pointer; transition: background .2s; margin-top: 4px;
    }
    .btn:hover { background: #9b8df9; }
    .btn:disabled { background: var(--border); cursor: not-allowed; }

    .msg { font-size: 13px; padding: 10px 14px; border-radius: 8px; text-align: center; display: none; }
    .msg.error { background: rgba(248,113,113,.1); color: var(--error); border: 1px solid rgba(248,113,113,.2); display: block; }
    .msg.success { background: rgba(15,168,110,.1); color: var(--accent2); border: 1px solid rgba(15,168,110,.2); display: block; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo-row">
    <div class="logo">🔮</div>
    <h1>Gemini RAG</h1>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('login')">Sign In</button>
    <button class="tab" onclick="switchTab('register')">Register</button>
  </div>

  <!-- Login -->
  <form class="form" id="loginForm" onsubmit="handleLogin(event)">
    <div><label>Email</label><input type="email" id="loginEmail" placeholder="you@example.com" required /></div>
    <div><label>Password</label><input type="password" id="loginPassword" placeholder="••••••••" required /></div>
    <div class="msg" id="loginMsg"></div>
    <button class="btn" type="submit" id="loginBtn">Sign In</button>
  </form>

  <!-- Register -->
  <form class="form hidden" id="registerForm" onsubmit="handleRegister(event)">
    <div><label>Username</label><input type="text" id="regUsername" placeholder="johndoe" required /></div>
    <div><label>Email</label><input type="email" id="regEmail" placeholder="you@example.com" required /></div>
    <div><label>Password</label><input type="password" id="regPassword" placeholder="Min. 6 characters" required /></div>
    <div class="msg" id="registerMsg"></div>
    <button class="btn" type="submit" id="registerBtn">Create Account</button>
  </form>
</div>

<script>
  // Redirect if already logged in
  if (localStorage.getItem("token")) window.location.href = "/chat";

  function switchTab(tab) {
    document.getElementById("loginForm").classList.toggle("hidden", tab !== "login");
    document.getElementById("registerForm").classList.toggle("hidden", tab !== "register");
    document.querySelectorAll(".tab").forEach((t, i) =>
      t.classList.toggle("active", (i === 0 && tab === "login") || (i === 1 && tab === "register"))
    );
  }

  function showMsg(id, text, type) {
    const el = document.getElementById(id);
    el.textContent = text;
    el.className = `msg ${type}`;
  }

  async function handleLogin(e) {
    e.preventDefault();
    const btn = document.getElementById("loginBtn");
    btn.disabled = true; btn.textContent = "Signing in...";
    try {
      const res = await fetch("/api/login", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email: loginEmail.value, password: loginPassword.value })
      });
      const data = await res.json();
      if (!res.ok) return showMsg("loginMsg", data.error, "error");
      localStorage.setItem("token", data.token);
      localStorage.setItem("username", data.username);
      window.location.href = "/chat";
    } catch {
      showMsg("loginMsg", "Connection error. Try again.", "error");
    } finally {
      btn.disabled = false; btn.textContent = "Sign In";
    }
  }

  async function handleRegister(e) {
    e.preventDefault();
    const btn = document.getElementById("registerBtn");
    btn.disabled = true; btn.textContent = "Creating account...";
    try {
      const res = await fetch("/api/register", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username: regUsername.value, email: regEmail.value, password: regPassword.value })
      });
      const data = await res.json();
      if (!res.ok) return showMsg("registerMsg", data.error, "error");
      showMsg("registerMsg", "Account created! Signing you in...", "success");
      setTimeout(() => switchTab("login"), 1200);
    } catch {
      showMsg("registerMsg", "Connection error. Try again.", "error");
    } finally {
      btn.disabled = false; btn.textContent = "Create Account";
    }
  }
</script>
</body>
</html>
