<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gemini RAG</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f0f13;
      --surface: #1a1a24;
      --border: #2a2a3a;
      --accent: #7c6af7;
      --accent2: #0fa86e;
      --text: #e8e8f0;
      --muted: #6b6b8a;
      --user-bg: #2a2060;
      --bot-bg: #1a1a24;
      --radius: 14px;
      --font: 'Inter', system-ui, sans-serif;
      --mono: 'JetBrains Mono', monospace;
    }
    body { background: var(--bg); color: var(--text); font-family: var(--font); height: 100dvh; display: flex; flex-direction: column; }

    /* Header */
    header {
      padding: 16px 24px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px; background: var(--surface);
    }
    .logo { width: 36px; height: 36px; border-radius: 10px; background: linear-gradient(135deg, var(--accent), var(--accent2)); display: grid; place-items: center; font-size: 18px; }
    header h1 { font-size: 16px; font-weight: 700; }
    header span { font-size: 12px; color: var(--muted); margin-left: auto; }
    .token-badge { font-size: 11px; background: rgba(124,106,247,.15); border: 1px solid rgba(124,106,247,.3); color: var(--accent); border-radius: 6px; padding: 3px 8px; white-space: nowrap; }
    .token-badge.expiring { background: rgba(248,113,113,.1); border-color: rgba(248,113,113,.3); color: #f87171; }
    .logout-btn { background: none; border: 1px solid var(--border); color: var(--muted); border-radius: 8px; padding: 6px 14px; font-size: 13px; cursor: pointer; transition: all .2s; }
    .logout-btn:hover { border-color: var(--error, #f87171); color: #f87171; }

    /* Chat area */
    #chat { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 20px; }
    #chat::-webkit-scrollbar { width: 4px; }
    #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .msg { display: flex; gap: 12px; max-width: 820px; animation: fadeUp .3s ease both; }
    .msg.user { flex-direction: row-reverse; align-self: flex-end; }
    .msg.bot  { align-self: flex-start; }

    .avatar {
      width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
      display: grid; place-items: center; font-size: 14px;
    }
    .msg.user .avatar { background: var(--user-bg); border: 1px solid var(--accent); }
    .msg.bot  .avatar { background: var(--surface); border: 1px solid var(--border); }

    .bubble {
      padding: 12px 16px; border-radius: var(--radius); font-size: 14px; line-height: 1.65;
      max-width: calc(100% - 44px);
    }
    .msg.user .bubble { background: var(--user-bg); border: 1px solid rgba(124,106,247,.3); border-top-right-radius: 4px; }
    .msg.bot  .bubble { background: var(--bot-bg); border: 1px solid var(--border); border-top-left-radius: 4px; }

    /* Upload */
    .upload-bar {
      padding: 10px 24px; border-bottom: 1px solid var(--border);
      background: var(--surface); display: flex; align-items: center; gap: 12px;
    }
    .drop-zone {
      flex: 1; border: 1.5px dashed var(--border); border-radius: 10px;
      padding: 10px 16px; font-size: 13px; color: var(--muted);
      cursor: pointer; transition: border-color .2s; text-align: center;
    }
    .drop-zone.dragover { border-color: var(--accent); color: var(--accent); }
    .drop-zone input { display: none; }
    .upload-status { font-size: 12px; color: var(--accent2); min-width: 160px; text-align: right; }

    /* Typing indicator */
    .typing { display: flex; gap: 4px; align-items: center; padding: 4px 0; }
    .typing span { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); animation: bounce .9s infinite; }
    .typing span:nth-child(2) { animation-delay: .15s; }
    .typing span:nth-child(3) { animation-delay: .3s; }

    /* Input bar */
    footer {
      padding: 16px 24px; border-top: 1px solid var(--border); background: var(--surface);
    }
    .input-row { display: flex; gap: 10px; max-width: 820px; margin: 0 auto; }
    #query {
      flex: 1; background: var(--bg); border: 1px solid var(--border); color: var(--text);
      border-radius: 10px; padding: 12px 16px; font-size: 14px; font-family: var(--font);
      outline: none; transition: border-color .2s; resize: none; height: 48px; line-height: 1.4;
    }
    #query:focus { border-color: var(--accent); }
    #query::placeholder { color: var(--muted); }
    #send {
      background: var(--accent); color: #fff; border: none; border-radius: 10px;
      width: 48px; height: 48px; cursor: pointer; font-size: 18px; transition: background .2s;
      display: grid; place-items: center; flex-shrink: 0;
    }
    #send:hover { background: #9b8df9; }
    #send:disabled { background: var(--border); cursor: not-allowed; }

    /* Welcome */
    .welcome { text-align: center; margin: auto; color: var(--muted); }
    .welcome .icon { font-size: 48px; margin-bottom: 12px; }
    .welcome h2 { font-size: 20px; color: var(--text); margin-bottom: 8px; }
    .welcome p { font-size: 14px; }
    .suggestions { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 16px; }
    .suggestion {
      background: var(--surface); border: 1px solid var(--border); border-radius: 20px;
      padding: 8px 16px; font-size: 13px; cursor: pointer; transition: border-color .2s;
    }
    .suggestion:hover { border-color: var(--accent); color: var(--accent); }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
    @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }
  </style>
</head>
<body>

<header>
  <div class="logo">🔮</div>
  <h1>Gemini RAG</h1>
  <span id="userGreeting"></span>
  <span class="token-badge" id="tokenBadge"></span>
  <button class="logout-btn" onclick="logout()">Sign Out</button>
</header>

<div class="upload-bar">
  <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
    <input type="file" id="fileInput" accept=".pdf" />
    📎 Click or drag & drop a PDF to add to knowledge base
  </div>
  <div class="upload-status" id="uploadStatus"></div>
</div>

<div id="chat">
  <div class="welcome" id="welcome">
    <div class="icon">🧠</div>
    <h2>Ask anything about your documents</h2>
    <p>The AI will retrieve relevant context and generate a grounded answer.</p>
    <div class="suggestions">
      <div class="suggestion" onclick="ask('What is AWS Lambda?')">What is AWS Lambda?</div>
      <div class="suggestion" onclick="ask('How does DynamoDB work?')">How does DynamoDB work?</div>
      <div class="suggestion" onclick="ask('What is Amazon S3 used for?')">What is Amazon S3 used for?</div>
      <div class="suggestion" onclick="ask('Explain AWS IAM')">Explain AWS IAM</div>
    </div>
  </div>
</div>

<footer>
  <div class="input-row">
    <textarea id="query" placeholder="Ask a question about your documents..." rows="1"></textarea>
    <button id="send" onclick="submitQuery()">➤</button>
  </div>
</footer>

<script>
  // Auth guard
  const token = localStorage.getItem("token");
  if (!token) { window.location.href = "/"; }
  else {
    try {
      const payload = JSON.parse(atob(token.split(".")[1]));
      if (payload.exp * 1000 <= Date.now()) {
        localStorage.removeItem("token"); localStorage.removeItem("username");
        window.location.href = "/";
      }
    } catch { localStorage.removeItem("token"); window.location.href = "/"; }
  }
  const username = localStorage.getItem("username") || "User";
  document.getElementById("userGreeting").textContent = `👤 ${username}`;

  function logout() {
    localStorage.removeItem("token");
    localStorage.removeItem("username");
    window.location.href = "/";
  }

  function authHeaders() {
    return { "Content-Type": "application/json", "Authorization": `Bearer ${token}` };
  }

  const chat = document.getElementById("chat");
  const queryEl = document.getElementById("query");
  const sendBtn = document.getElementById("send");

  queryEl.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); submitQuery(); }
  });

  // ── PDF Upload ──────────────────────────────────────────────────────────────
  const dropZone = document.getElementById("dropZone");
  const fileInput = document.getElementById("fileInput");
  const uploadStatus = document.getElementById("uploadStatus");

  fileInput.addEventListener("change", () => uploadFile(fileInput.files[0]));

  dropZone.addEventListener("dragover", e => { e.preventDefault(); dropZone.classList.add("dragover"); });
  dropZone.addEventListener("dragleave", () => dropZone.classList.remove("dragover"));
  dropZone.addEventListener("drop", e => {
    e.preventDefault();
    dropZone.classList.remove("dragover");
    uploadFile(e.dataTransfer.files[0]);
  });

  async function uploadFile(file) {
    if (!file || !file.name.endsWith(".pdf")) return;
    uploadStatus.textContent = `⏳ Uploading ${file.name}...`;
    const form = new FormData();
    form.append("pdf", file);
    try {
      const res = await fetch("/api/upload", { method: "POST", headers: { "Authorization": `Bearer ${token}` }, body: form });
      const data = await res.json();
      uploadStatus.textContent = data.error ? `⚠️ ${data.error}` : data.message;
    } catch {
      uploadStatus.textContent = "⚠️ Upload failed";
    }
    fileInput.value = "";
  }

  function ask(text) { queryEl.value = text; submitQuery(); }

  function appendMsg(role, content) {
    document.getElementById("welcome")?.remove();
    const msg = document.createElement("div");
    msg.className = `msg ${role}`;
    msg.innerHTML = `
      <div class="avatar">${role === "user" ? "👤" : "🔮"}</div>
      <div class="bubble">${content}</div>`;
    chat.appendChild(msg);
    chat.scrollTop = chat.scrollHeight;
    return msg.querySelector(".bubble");
  }

  function renderAnswer(answer) {
    return answer.replace(/\n/g, "<br>");
  }

  async function submitQuery() {
    const query = queryEl.value.trim();
    if (!query) return;

    queryEl.value = "";
    sendBtn.disabled = true;
    appendMsg("user", query);

    const botBubble = appendMsg("bot", `<div class="typing"><span></span><span></span><span></span></div>`);

    try {
      const res = await fetch("/api/ask", {
        method: "POST",
        headers: authHeaders(),
        body: JSON.stringify({ query }),
      });
      const data = await res.json();
      botBubble.innerHTML = data.error
        ? `⚠️ ${data.error}`
        : renderAnswer(data.answer);
    } catch {
      botBubble.innerHTML = "⚠️ Failed to connect to server.";
    } finally {
      sendBtn.disabled = false;
      queryEl.focus();
      chat.scrollTop = chat.scrollHeight;
    }
  }
</script>
</body>
</html>
